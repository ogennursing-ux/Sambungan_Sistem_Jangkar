# Deploys the hub to Cloudflare Workers on every push, and pushes the
# Telegram/webhook secrets into the worker.
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID,
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, WEBHOOK_SECRET
name: Deploy hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # Deploy runs only once the Cloudflare secrets are configured; until then
    # the steps skip quietly so the workflow stays green.
    env:
      HAS_CF: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - name: Secrets not configured yet
        if: env.HAS_CF != 'true'
        run: echo "::notice::Cloudflare secrets are not set — skipping deploy (see README)."
      - uses: actions/checkout@v4
        if: env.HAS_CF == 'true'
      - uses: cloudflare/wrangler-action@v3
        if: env.HAS_CF == 'true'
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            TELEGRAM_BOT_TOKEN
            TELEGRAM_CHAT_ID
            WEBHOOK_SECRET
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
