# Runs the unit test suite on every push and pull request (the deploy workflow
# also runs it, but only on main — this gives branches and PRs fast feedback).
name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test
